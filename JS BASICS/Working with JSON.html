<body>
    Json modules/working with json

<script>
    let myobj={
        Name:"Bishal",
        Education:"BCE",
        Address:"Silicon VAlley",
        Food:"Mushroom"
    }
  
    console.log(myobj)
    myjsonstr=JSON.stringify(myobj)
    console.log(myjsonstr)

    x=myjsonstr.replace('Bishal','Pinnell')
    console.log(x)

    //parsing the json string back to json obj

    newjsonobj=JSON.parse(myjsonstr)
    console.log(newjsonobj)
</script>
