<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    This is demonstration of math functions in javascript
</body>
<script>
   let a=32.89;
   let b=34.44;

   console.log("The min value is ",Math.min(a,b))
   console.log("The max value is ",Math.max(a,b))

   console.log("The value of pi is ",Math.PI)

   console.log("The rounded value of a is ",Math.round(a))

   console.log('The ceiling value is ',Math.ceil(a))
   console.log("the floor value is",Math.floor(a))

   
   console.log('The ceiling value is ',Math.ceil(b))
   console.log("the floor value is",Math.floor(b))

   //generate random numbers between 0 and 1
   let r=Math.random()
   console.log(r)

   //generate random numbers between any two numbers a and b
   let x=20
   let y=60
   
   x_y=x+(y-x)*Math.random();
   console.log(x_y)


</script>
</html>
